<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>katie chan · portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://unpkg.com/css-doodle@0.34.1/css-doodle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&family=Rubik+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Figtree', 'Poppins', 'Montserrat', 'Nunito', Arial, sans-serif;
      background-color: #4F4F4F;
      color: #EDEDED;
      line-height: 1.5;
    }

    h1, h2, h3 {
      font-family: 'Rubik One', 'Figtree', 'Poppins', sans-serif;
      font-weight: 400;
    }

    :root {
      --bg-main: #4F4F4F;
      --bg-layer-1: #5A5A5A;
      --bg-layer-2: #606060;
      --border-line: #707070;
      --text-primary: #EDEDED;
      --button-text: #3E3E3E;
      --accent-green: #7FA873;
      --accent-green-hover: #739B68;
      --accent-green-border: #CFE3C6;
      --shadow-button: 0 8px 0 rgba(0,0,0,0.35);
      --container-max-width: 1200px;
      --container-padding-x: 40px;
    }

    .container {
      max-width: var(--container-max-width);
      margin: 0 auto;
      padding: 0 var(--container-padding-x);
      width: 100%;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      background-color: transparent;
      z-index: 100;
      color: var(--text-primary);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .logo-icon {
      font-size: 20px;
      line-height: 1;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
    }

    .nav-icons {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-icons span {
      font-size: 22px;
      transition: opacity 0.2s ease;
      cursor: default;
      display: inline-block;
      font-weight: 300;
      -webkit-text-stroke: 1.2px #fff;
      color: rgba(255,255,255,0.9);
      opacity: 0.95;
    }

    .nav-icons span:hover {
      opacity: 1;
      -webkit-text-stroke-color: var(--accent-green);
    }

    .nav-icons a {
      color: var(--text-primary);
      text-decoration: none;
    }

    .white-text {
      color: var(--text-primary);
    }

    .scroll-area {
      min-height: 220vh;
      position: relative;
      background-color: var(--bg-main);
    }

    .portfolio-btn {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 636px;
      height: 160px;
      background-color: var(--accent-green);
      border: 2px solid var(--accent-green-border);
      border-radius: 4px;
      box-shadow: var(--shadow-button);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: all 0.2s ease;
      z-index: 10;
      top: 20vh;
    }

    .portfolio-btn span {
      font-family: 'Rubik One', 'Figtree', 'Poppins', sans-serif;
      font-size: 52px;
      font-weight: 800;
      letter-spacing: 7px;
      line-height: 1;
      text-transform: uppercase;
      color: var(--button-text);
    }

    .portfolio-btn:hover {
      background-color: var(--accent-green-hover);
      transform: translate(-50%, -4px);
      box-shadow: 0 12px 0 rgba(0,0,0,0.35);
    }

    .tetris-section {
      position: relative;
      z-index: 20;
      display: flex;
      justify-content: center;
    }

    .tetris-svg {
      width: 100%;
      max-width: 1600px;
      height: auto;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
    }

    .tetris-piece {
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .tetris-piece:hover {
      filter: brightness(1.2);
      transform: translateY(-5px);
    }

    .tetris-anchor {
      border: 2px solid #CFE3C6;
    }

    .piece-label {
      font-family: 'Figtree', sans-serif;
      font-size: 12px;
      font-weight: 700;
      fill: #EDEDED !important;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 0.03em;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .piece-label.is-visible {
      opacity: 1;
    }

    @media screen and (max-width: 1600px) {
      .tetris-section {
        height: 547px;
      }
      .portfolio-btn {
        width: 433px;
      }
    }

    @media screen and (max-width: 900px) {
      .portfolio-btn {
        width: 350px;
        height: 120px;
      }
      .portfolio-btn span {
        font-size: 44px;
        letter-spacing: 6px;
      }
    }

    @media screen and (max-width: 800px) {
      :root {
        --container-padding-x: 30px;
      }

      .navbar {
        padding: 0 24px;
        height: 70px;
      }

      .nav-icons {
        gap: 18px;
      }

      .nav-icons span {
        font-size: 20px;
      }

      .portfolio-btn {
        width: 300px;
        height: 100px;
      }

      .portfolio-btn span {
        font-size: 38px;
        letter-spacing: 5px;
      }

      .piece-label {
        font-size: 10px;
      }
    }

    @media screen and (max-width: 500px) {
      .navbar {
        padding: 0 20px;
        height: 65px;
      }

      .logo-area {
        font-size: 16px;
      }

      .nav-icons span {
        font-size: 18px;
      }

      .portfolio-btn {
        width: 85%;
        height: 90px;
      }

      .portfolio-btn span {
        font-size: 32px;
        letter-spacing: 4px;
      }

      .scroll-area {
        min-height: 200vh;
      }

      .piece-label {
        font-size: 9px;
      }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo-area">
      <span>katie chan</span>
      <span class="logo-icon"><i class="fa-regular fa-file-lines white-text"></i></span>
    </div>
    <div class="nav-icons">
      <span><a href="portfolio.html"><i class="fa-solid fa-briefcase white-text"></i></a></span>
      <span><a href="about.html"><i class="fa-solid fa-user white-text"></i></a></span>
      <span><a href="index.html#contact-section"><i class="fa-solid fa-comment white-text"></i></a></span>
    </div>
  </header>

  <main>
    <section class="scroll-area">
      <a href="#tetris-section" class="portfolio-btn" id="parallaxBtn">
        <span>PORTFOLIO</span>
      </a>
    </section>

    <section class="tetris-section" id="tetris-section">
      <svg class="tetris-svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet">

        <a class="tetris-anchor" href="hp-sprocket.html">
          <g class="tetris-piece">
            <rect x="80" y="0" width="80" height="160" style="mix-blend-mode:darken;fill:#626262;stroke:#7D7D7D;stroke-width:2"/>
            <rect x="80" y="80" width="160" height="80" style="mix-blend-mode:darken;fill:#626262;stroke:#7D7D7D;stroke-width:2"/>
            <text class="piece-label" x="160" y="120">HP SPROCKET</text>
          </g>
        </a>

        <a href="">
          <g class="tetris-piece" style="mix-blend-mode:lighten;fill:#626262;stroke-width:2">
            <rect style="stroke: #7D7D7D;" x="80" y="160" width="160" height="80"/>
            <!-- <text class="piece-label" x="160" y="200">PROJECT 2</text> -->
          </g>
        </a>

        <a href="lily-living.html">
          <g class="tetris-piece" style="mix-blend-mode:lighten;fill:#626262;stroke-width:2">
            <rect style="stroke: #7D7D7D;" x="320" y="240" width="160" height="160"/>
            <text class="piece-label" x="400" y="320">LILY LIVING</text>
          </g>
        </a>

        <a class="tetris-anchor" href="leopardy.html">
          <g class="tetris-piece">
            <rect x="80" y="240" width="160" height="80" style="mix-blend-mode:darken;fill:#626262;stroke:#7D7D7D;stroke-width:2"/>
            <rect x="80" y="240" width="80" height="160" style="mix-blend-mode:darken;fill:#626262;stroke:#7D7D7D;stroke-width:2"/>
            <text class="piece-label" x="160" y="280">LEOPARDY</text>
          </g>
        </a>

        <a class="tetris-anchor" href="">
          <g class="tetris-piece">
            <rect x="160" y="320" width="160" height="80" style="mix-blend-mode:darken;fill:#626262;stroke:#7D7D7D;stroke-width:2"/>
            <rect x="240" y="240" width="80" height="160" style="mix-blend-mode:darken;fill:#626262;stroke:#7D7D7D;stroke-width:2"/>
            <!-- <text class="piece-label" x="240" y="360">PROJECT 5</text> -->
          </g>
        </a>

        <a class="tetris-anchor" href="">
          <g class="tetris-piece" style="mix-blend-mode:lighten;fill:#626262;stroke-width:2">
            <rect style="stroke: #7D7D7D;" x="480" y="320" width="160" height="80"/>
            <!-- <text class="piece-label" x="560" y="360">Project 6</text> -->
          </g>
        </a>

        <a class="tetris-anchor" href="">
          <g class="tetris-piece">
            <rect x="480" y="240" width="160" height="80" style="mix-blend-mode:darken;fill:#626262;stroke:#7D7D7D;stroke-width:2"/>
            <rect x="560" y="160" width="80" height="160" style="mix-blend-mode:darken;fill:#626262;stroke:#7D7D7D;stroke-width:2"/>
            <!-- <text class="piece-label" x="560" y="280">PROJECT 7</text> -->
          </g>
        </a>

        <a class="tetris-anchor" href="">
          <g class="tetris-piece" style="mix-blend-mode:lighten;fill:#626262;stroke:#7D7D7D;stroke-width:2">
            <rect x="640" y="240" width="80" height="160"/>
          </g>
        </a>

        <a class="tetris-anchor" href="everwatch.html">
          <g class="tetris-piece">
            <rect x="560" y="80" width="160" height="80" style="mix-blend-mode:darken;fill:#626262;stroke:#7D7D7D;stroke-width:2"/>
            <rect x="640" y="80" width="80" height="160" style="mix-blend-mode:darken;fill:#626262;stroke:#7D7D7D;stroke-width:2"/>
            <text class="piece-label" x="640" y="120">EVERWATCH</text>
          </g>
        </a>

      </svg>
    </section>
  </main>

  <script>
    function getEndVH() {
      const width = window.innerWidth;
      if (width < 1600) return 233.25;
      return 245;
    }

    (function() {
      const button = document.getElementById('parallaxBtn');
      const scrollArea = document.querySelector('.scroll-area');

      const startVH = 20;
      let endVH = getEndVH();

      let ticking = false;
      let resizeTimeout;

      function updateButtonPosition() {
        const scrollY = window.scrollY;
        const scrollable = document.documentElement.scrollHeight - window.innerHeight;
        const progress = Math.min(1, Math.max(0, window.scrollY / scrollable));

        const middleVH = 170;
        const moveStart = 0.95;

        let topPosition;

        if (progress < moveStart) {
          const p = progress / moveStart;
          topPosition = startVH + p * (middleVH - startVH);
        } else {
          const p = (progress - moveStart) / (1 - moveStart);
          topPosition = middleVH + p * (endVH - middleVH);
        }

        button.style.transform = 'translateX(-50%)';
        button.style.top = topPosition + 'vh';

        ticking = false;
      }

      function onScroll() {
        if (!ticking) {
          requestAnimationFrame(updateButtonPosition);
          ticking = true;
        }
      }

      function onResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          endVH = getEndVH();
          updateButtonPosition();
        }, 100);
      }

      updateButtonPosition();

      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onResize, { passive: true });
    })();

    const pieces = document.querySelectorAll('.tetris-piece');

    pieces.forEach(piece => {
      piece.addEventListener('mouseenter', () => {
        const label = piece.querySelector('.piece-label');
        if (label) {
          label.classList.add('is-visible');
        }
      });
    });
  </script>
</body>
</html>
